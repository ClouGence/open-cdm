/*
 * This file was generated by the Gradle 'init' task.
 */
plugins {
    id 'com.clougence.plugin-conventions'
    id 'antlr'
}

dependencies {
    // project
    antlr "org.antlr:antlr4:${ANTLR_VERSION}"
    implementation project(':dsc-common')
    implementation 'com.aliyun:maxcompute20220104:3.5.0'
    implementation 'com.aliyun:tea-openapi:0.3.10'
    implementation 'com.aliyun:tea-console:0.0.1'
    implementation 'com.aliyun:tea-util:0.2.23'
    implementation 'com.aliyun:credentials-java:1.0.2'
    implementation 'com.aliyun:tea:1.1.14'

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')

    // driver libs (compileOnly)
    compileOnly 'com.aliyun.odps:odps-jdbc:3.10.5'
}

description = 'ds-maxcompute'

configureClougenceAntlrGrammar([outputPath : 'src/main/java/com/clougence/clouddm/ds/maxcompute/parser/antlr',
                                packageName: 'com.clougence.clouddm.ds.maxcompute.parser.antlr'])

