/*
 * This file was generated by the Gradle 'init' task.
 */
plugins {
    id 'antlr'
    id 'com.clougence.plugin-conventions'
}

dependencies {
    // project
    implementation project(':dsc-common')

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')

    // driver libs (compileOnly)
    compileOnly 'org.mongodb:mongodb-driver-sync:5.6.5'
}

description = 'ds-mongodb'

configureClougenceAntlrGrammar([outputPath : 'src/main/java/com/clougence/clouddm/ds/mongodb/parser/antlr',
                                packageName: 'com.clougence.clouddm.ds.mongodb.parser.antlr'])

dependencies {
    antlr "org.antlr:antlr4:${ANTLR_VERSION}"
    compileOnly "org.antlr:antlr4-runtime:${ANTLR_VERSION}"
}

