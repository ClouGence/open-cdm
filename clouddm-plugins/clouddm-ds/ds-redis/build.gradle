/*
 * This file was generated by the Gradle 'init' task.
 */
plugins {
    id 'com.clougence.plugin-conventions'
    id 'antlr'
}

dependencies {
    // project
    antlr "org.antlr:antlr4:${ANTLR_VERSION}"
    implementation project(':dsc-common')

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')

    // driver libs (compileOnly)
    compileOnly 'redis.clients:jedis:7.0.0'
}

description = 'ds-redis'

configureClougenceAntlrGrammar([outputPath : 'src/main/java/com/clougence/clouddm/ds/redis/parser/antlr',
                                packageName: 'com.clougence.clouddm.ds.redis.parser.antlr'])

