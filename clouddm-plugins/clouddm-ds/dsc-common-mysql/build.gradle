/*
 * This file was generated by the Gradle 'init' task.
 */
plugins {
    id 'com.clougence.java-conventions'
    id 'antlr'
}

dependencies {
    // project
    antlr "org.antlr:antlr4:${ANTLR_VERSION}"
    api project(':dsc-common')

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')

    // driver libs (compileOnly)
    compileOnly 'com.mysql:mysql-connector-j:9.6.0'

    // for test
    testImplementation project(':dsc-common')
    testImplementation project(':cgdm-plugin-sdk')
}

description = 'dsc-common-mysql'

configureClougenceAntlrGrammar([outputPath : 'src/main/java/com/clougence/clouddm/dsfamily/mysql/parser/antlr',
                                packageName: 'com.clougence.clouddm.dsfamily.mysql.parser.antlr'])