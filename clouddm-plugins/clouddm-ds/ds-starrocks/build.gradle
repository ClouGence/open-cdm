/*
 * This file was generated by the Gradle 'init' task.
 */
plugins {
    id 'com.clougence.plugin-conventions'
    id 'antlr'
}

dependencies {
    // project
    antlr "org.antlr:antlr4:${ANTLR_VERSION}"
    implementation(project(':dsc-common-mysql'))
    implementation project(':cg-dslparser')

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')

    // driver libs (compileOnly)
    // compileOnly 'mysql:mysql-connector-java:8.0.25'
}

description = 'ds-starrocks'

configureClougenceAntlrGrammar([source     : files('src/main/antlr/StarRocksLex.g4', 'src/main/antlr/StarRocks.g4'),
                                outputPath : 'src/main/java/com/clougence/clouddm/ds/starrocks/parser/antlr',
                                packageName: 'com.clougence.clouddm.ds.starrocks.parser.antlr'])

