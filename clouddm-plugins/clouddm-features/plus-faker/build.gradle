/*
 * This file was generated by the Gradle 'init' task.
 */
plugins {
    id 'com.clougence.plugin-conventions'
    id 'antlr'
}

dependencies {
    // project
    antlr "org.antlr:antlr4:${ANTLR_VERSION}"
    implementation(project(':dsc-common'))
    implementation "net.hasor:cobble-all:4.6.3"
    implementation "org.mybatis:mybatis:3.5.13"

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')
}

configureClougenceAntlrGrammar([maxHeapSize: '64m',
                                outputPath : 'src/main/java/com/clougence/clouddm/faker/config/dsl/antlr',
                                packageName: 'com.clougence.clouddm.faker.config.dsl.antlr'])

description = 'plus-faker'

