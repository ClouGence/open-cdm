/*
 * This file was generated by the Gradle 'init' task.
 */
plugins {
    id 'com.clougence.plugin-conventions'
}

dependencies {
    // project
    implementation 'com.dingtalk.open:app-stream-client:1.3.5'
    implementation 'com.aliyun:dingtalk:2.1.98'
    implementation('com.aliyun:alibaba-dingtalk-service-sdk:2.0.0') {
        exclude group: 'com.sun.jmx', module: 'jmxri'
        exclude group: 'log4j', module: 'log4j'
    }

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')

    // for test
    testImplementation project(':cgdm-plugin-sdk')
    testImplementation 'com.dingtalk.open:app-stream-client:1.3.5'
    testImplementation 'com.aliyun:dingtalk:2.1.95'
    testImplementation('com.aliyun:alibaba-dingtalk-service-sdk:2.0.0') {
        exclude group: 'com.sun.jmx', module: 'jmxri'
        exclude group: 'log4j', module: 'log4j'
    }
}

description = 'plus-provider-dingtalk'

