/*
 * This file was generated by the Gradle 'init' task.
 */
plugins {
    id 'com.clougence.plugin-conventions'
}

dependencies {
    // project
    implementation 'commons-codec:commons-codec:1.15'
    implementation 'org.json:json:20240303'
    implementation('cn.felord:wecom-sdk:1.2.9') {
        exclude group: "com.fasterxml.jackson.core", module: "jackson-databind"
        exclude group: "com.fasterxml.jackson.core", module: "jackson-datatype-jsr310"
        exclude group: "com.squareup.okhttp3", module: "okhttp"
        exclude group: "com.squareup.okhttp3", module: "logging-interceptor"
    }
    implementation 'commons-codec:commons-codec:1.15'

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')

    // for test
    testImplementation project(':cgdm-plugin-sdk')
}

description = 'plus-provider-wechat'