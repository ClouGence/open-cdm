plugins {
    id 'com.clougence.plugin-conventions'
}

dependencies {
    // project
    implementation('com.larksuite.oapi:oapi-sdk:2.4.10') {
        exclude group: "org.slf4j", module: "slf4j-api"
    }

    // share lib (compileOnly)
    compileOnly project(':cgdm-share-libs')

    // for test
    testImplementation project(':cgdm-plugin-sdk')
    testImplementation 'com.fasterxml.jackson.core:jackson-databind:2.11.0'
    testImplementation 'com.larksuite.oapi:oapi-sdk:2.4.10'
}

description = 'plus-provider-feishu'

