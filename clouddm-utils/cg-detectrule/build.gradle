/*
 * This file was generated by the Gradle 'init' task.
 */

plugins {
    id 'com.clougence.java-conventions'
    id 'antlr'
}

dependencies {
    // project
    antlr "org.antlr:antlr4:${ANTLR_VERSION}"
    api "org.antlr:antlr4-runtime:${ANTLR_VERSION}"
    api project(':cg-dslparser')
    api project(':cg-utils')

    // for test
}

configureClougenceAntlrGrammar([enabled    : false,
                                maxHeapSize: '64m',
                                outputPath : 'src/main/java/com/clougence/detectrule/parser/antlr/',
                                packageName: 'com.clougence.detectrule.parser.antlr'])

description = 'cg-detectrule'
