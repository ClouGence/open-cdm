# JDK security properties override.
# Loaded via -Djava.security.properties (single '='), which appends to the
# JDK master file — same-key values here take precedence over JDK defaults.
#
# Why: JDK 11u322+ and JDK 17+ disabled TLSv1 and TLSv1.1 by default.
# Some SQL Server instances still require TLS 1.0, so we remove TLSv1 and
# TLSv1.1 from the disabled list while keeping all other restrictions intact.

jdk.tls.disabledAlgorithms=SSLv3, RC4, DES, \
    MD5withRSA, DH keySize < 1024, EC keySize < 224, 3DES_EDE_CBC, anon, NULL, \
    ECDH
